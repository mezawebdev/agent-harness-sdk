name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run build

      - run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="$(node -p "require('./package.json').version")"
          # Extract the block under "## [<version>] ..." up to the next "## [" heading,
          # straight to a file. We pass it with --notes-file (never interpolated into
          # the shell), so backticks/`$(...)` in the changelog are NOT evaluated —
          # markdown inline code stays inert instead of running as commands.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/      { exit }
            capture                  { print }
          ' CHANGELOG.md > release-notes.md
          if [ -z "$(tr -d '[:space:]' < release-notes.md)" ]; then
            echo "Release $TAG. See CHANGELOG.md for details." > release-notes.md
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
